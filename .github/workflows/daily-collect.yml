name: Daily Knowledge Collection

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    working-directory: ai-zhishiku-v4

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ai-zhishiku-v4/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure LLM keys
        run: |
          touch .env
          echo "LLM_PROVIDER=${{ secrets.LLM_PROVIDER }}" >> .env
          echo "DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}" >> .env
          echo "QWEN_API_KEY=${{ secrets.QWEN_API_KEY }}" >> .env
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env

      - name: Run collection pipeline
        run: python pipeline/pipeline.py --sources github,rss --limit 20 --verbose

      - name: Validate articles
        run: python hooks/validate_json.py knowledge/articles/*.json

      - name: Check article quality
        run: python hooks/check_quality.py knowledge/articles/*.json

      - name: Check for new articles
        id: check_changes
        run: |
          NEW_FILES=$(git diff --name-only --diff-filter=A HEAD -- knowledge/articles/ | wc -l)
          echo "new_count=$NEW_FILES" >> $GITHUB_OUTPUT

          if git diff --quiet HEAD -- knowledge/; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No new articles to commit."
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          DATE=$(date -u +"%Y-%m-%d")
          COUNT=$(git diff --name-only --diff-filter=A HEAD -- knowledge/articles/ | wc -l)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add knowledge/
          git commit -m "chore(knowledge): daily collect ${COUNT} articles on ${DATE}"
          git push
